<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Angelo — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, 'SF Pro Display', system-ui, sans-serif;
      background: #0a0a0a; color: #e5e5e5;
      display: flex; align-items: center; justify-content: center;
      min-height: 100dvh; padding: 24px; text-align: center;
    }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
    p { font-size: 15px; color: #888; margin-bottom: 24px; }
    button {
      background: #1c1c1e; border: 1px solid #333; border-radius: 10px;
      color: #e5e5e5; padding: 12px 24px; font-size: 15px; cursor: pointer;
    }
    button:active { background: #2c2c2e; }
  </style>
</head>
<body>
  <div>
    <h1>You're offline</h1>
    <p>Angelo needs a connection to load this page.<br/>Cached pages still work.</p>
    <button onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
